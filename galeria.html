<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tektonium - Galería Visión Espacial">
    <title>Tektonium - Galería</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg-color: #050505;
            --bg-surface: rgba(20, 20, 22, 0.7);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-glow-1 {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
            top: 20%;
            left: 20%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(80px);
            animation: pulse-alt 10s infinite alternate-reverse;
        }

        .bg-glow-2 {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            transform: translate(30%, 30%);
            z-index: 1;
            filter: blur(80px);
            animation: pulse 12s infinite alternate;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 4rem 3rem;
            max-width: 900px;
            width: 90%;
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(30px);
            opacity: 0;
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        h1 {
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 10%, var(--primary) 60%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
            opacity: 0;
        }

        .photo-container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 25px rgba(188, 19, 254, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.8s forwards;
            position: relative;
            background: rgba(0, 0, 0, 0.5);
        }

        .photo-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-container:hover img {
            transform: scale(1.02);
        }

        .btn-back {
            display: inline-block;
            margin-top: 3rem;
            color: var(--secondary);
            text-decoration: none;
            border: 1px solid rgba(188, 19, 254, 0.4);
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.1);
            animation: fadeIn 1.5s ease-out 1.2s forwards;
            opacity: 0;
            background: rgba(188, 19, 254, 0.05);
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.25);
            background: rgba(188, 19, 254, 0.1);
            border-color: var(--secondary);
        }

        @keyframes floatUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: translate(30%, 30%) scale(0.9);
                opacity: 0.7;
            }

            100% {
                transform: translate(30%, 30%) scale(1.1);
                opacity: 1;
            }
        }

        @keyframes pulse-alt {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <h1>Visión Estelar</h1>
        <p class="subtitle">La armonía del universo y la estructura en una sola imagen.</p>

        <div class="photo-container">
            <img src="foto.png" alt="Concepto Katamari y la Tierra en el espacio">
        </div>

        <a href="index.html" class="btn-back">✧ Volver a la Base</a>
    </div>
</body>

</html>
